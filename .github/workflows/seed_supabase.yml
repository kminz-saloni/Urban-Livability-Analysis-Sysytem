name: Seed Supabase Dataset

on:
  workflow_dispatch:
    inputs:
      reset_database:
        description: "Reset existing data before seeding"
        required: true
        default: "true"

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed Supabase from Datasets.zip
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_POOLER_URL || secrets.SUPABASE_DATABASE_URL }}
          RESET_DATABASE: ${{ github.event.inputs.reset_database }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "ERROR: Set SUPABASE_POOLER_URL (preferred) or SUPABASE_DATABASE_URL in repo settings -> Secrets and re-run workflow."
            exit 1
          fi
          python seed_from_datasets.py

      - name: "Optional smoke-test: call backend `/api/rankings`"
        working-directory: backend
        env:
          BACKEND_URL: ${{ secrets.SUPABASE_BACKEND_URL }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "No SUPABASE_BACKEND_URL secret set; skipping smoke test."
            exit 0
          fi
          echo "Calling ${BACKEND_URL}/api/rankings"
          status=$(curl -s -o /dev/null -w "%{http_code}" "${BACKEND_URL}/api/rankings" || true)
          echo "HTTP status: $status"
          if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
            echo "Smoke-test passed"
          else
            echo "Smoke-test failed: HTTP $status"
            exit 1
          fi
